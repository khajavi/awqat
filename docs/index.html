<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fajr Time Calculator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-row {
            display: flex;
            gap: 15px;
        }
        
        label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        
        input:focus {
            outline: none;
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.15);
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .map-container {
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            height: 200px;
        }
        
        #map {
            width: 100%;
            height: 100%;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #e94560 0%, #c73e54 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        
        .result-time {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            text-shadow: 0 2px 15px rgba(233, 69, 96, 0.5);
        }
        
        .result-date {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
            font-size: 0.9rem;
        }
        
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            text-align: center;
        }
        
        .favorites-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .favorites-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .favorites-header h3 {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            font-weight: 500;
        }
        
        .favorites-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .favorite-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .favorite-item:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .favorite-item .name {
            color: #fff;
            font-size: 0.95rem;
        }
        
        .favorite-item .delete {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
            width: auto;
            margin: 0;
        }
        
        .favorite-item .delete:hover {
            color: #e94560;
            transform: none;
            box-shadow: none;
        }
        
        .add-favorite {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .add-favorite input {
            flex: 1;
        }
        
        .add-favorite button {
            width: auto;
            padding: 14px 20px;
            margin-top: 0;
            height: 48px;
        }
        
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 15px;
        }
        
        select:focus {
            outline: none;
            border-color: #e94560;
        }
        
        select option {
            background: #1a1a2e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fajr Time Calculator</h1>
        
        <div class="map-container">
            <div id="map"></div>
        </div>
        
        <div class="input-row">
            <div class="input-group" style="flex: 1;">
                <label>Latitude</label>
                <input type="number" id="latitude" step="any" placeholder="e.g., 35.6892" value="35.6892">
            </div>
            
            <div class="input-group" style="flex: 1;">
                <label>Longitude</label>
                <input type="number" id="longitude" step="any" placeholder="e.g., 51.3890" value="51.3890">
            </div>
        </div>
        
        <div class="favorites-section">
            <div class="favorites-header">
                <h3>Favorite Places</h3>
            </div>
            
            <div class="add-favorite">
                <input type="text" id="placeName" placeholder="Place name">
                <button onclick="addFavorite()">Save</button>
            </div>
            
            <div class="favorites-list" id="favoritesList"></div>
        </div>
        
        <button onclick="calculateFajr()">Calculate Fajr</button>
        
        <div class="result" id="result">
            <div class="result-label">Fajr Time (15° below horizon)</div>
            <div class="result-time" id="fajrTime">--:--</div>
            <div class="result-date" id="currentDate"></div>
        </div>
        
        <div class="info">
            Using 15° depression angle below the horizon
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/praytime@3.2.0/src/praytime.js"></script>
    <script>
        let map, marker;
        
        function initMap() {
            map = L.map('map').setView([35.6892, 51.3890], 10);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            
            marker = L.marker([35.6892, 51.3890], { draggable: true }).addTo(map);
            
            map.on('click', function(e) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;
                marker.setLatLng([lat, lng]);
                document.getElementById('latitude').value = lat.toFixed(6);
                document.getElementById('longitude').value = lng.toFixed(6);
                calculateFajr();
            });
            
            marker.on('dragend', function() {
                const pos = marker.getLatLng();
                document.getElementById('latitude').value = pos.lat.toFixed(6);
                document.getElementById('longitude').value = pos.lng.toFixed(6);
                calculateFajr();
            });
        }
        
        document.addEventListener('DOMContentLoaded', initMap);
        document.addEventListener('DOMContentLoaded', loadFavorites);
        
        function loadFavorites() {
            const favorites = JSON.parse(localStorage.getItem('fajrFavorites') || '[]');
            const list = document.getElementById('favoritesList');
            
            list.innerHTML = '';
            
            favorites.forEach((fav, index) => {
                const item = document.createElement('div');
                item.className = 'favorite-item';
                item.innerHTML = `
                    <span class="name">${fav.name}</span>
                    <button class="delete" onclick="deleteFavorite(${index})">×</button>
                `;
                item.onclick = (e) => {
                    if (!e.target.classList.contains('delete')) {
                        selectFavorite(index);
                    }
                };
                list.appendChild(item);
            });
        }
        
        function addFavorite() {
            const name = document.getElementById('placeName').value.trim();
            const latitude = parseFloat(document.getElementById('latitude').value);
            const longitude = parseFloat(document.getElementById('longitude').value);
            
            if (!name) {
                alert('Please enter a place name');
                return;
            }
            
            if (isNaN(latitude) || isNaN(longitude)) {
                alert('Please select a valid location on the map');
                return;
            }
            
            const favorites = JSON.parse(localStorage.getItem('fajrFavorites') || '[]');
            favorites.push({ name, latitude, longitude });
            localStorage.setItem('fajrFavorites', JSON.stringify(favorites));
            
            document.getElementById('placeName').value = '';
            loadFavorites();
        }
        
        function selectFavorite(index) {
            const favorites = JSON.parse(localStorage.getItem('fajrFavorites') || '[]');
            
            if (index === undefined || index === '') return;
            
            const fav = favorites[index];
            if (fav) {
                document.getElementById('latitude').value = fav.latitude;
                document.getElementById('longitude').value = fav.longitude;
                marker.setLatLng([fav.latitude, fav.longitude]);
                map.setView([fav.latitude, fav.longitude], 10);
                calculateFajr();
            }
        }
        
        function deleteFavorite(index) {
            const favorites = JSON.parse(localStorage.getItem('fajrFavorites') || '[]');
            favorites.splice(index, 1);
            localStorage.setItem('fajrFavorites', JSON.stringify(favorites));
            loadFavorites();
        }
        
        function calculateFajr() {
            const latitude = parseFloat(document.getElementById('latitude').value);
            const longitude = parseFloat(document.getElementById('longitude').value);
            
            if (isNaN(latitude) || isNaN(longitude)) {
                alert('Please enter valid latitude and longitude values');
                return;
            }
            
            if (latitude < -90 || latitude > 90) {
                alert('Latitude must be between -90 and 90');
                return;
            }
            
            if (longitude < -180 || longitude > 180) {
                alert('Longitude must be between -180 and 180');
                return;
            }
            
            const date = new Date();
            const PT = new PrayTime();
            PT.adjust({ fajr: 15 });
            
            const times = PT.getTimes(date, [latitude, longitude], 3.5);
            const fajrTime = times.fajr;
            
            const resultDiv = document.getElementById('result');
            const fajrTimeDiv = document.getElementById('fajrTime');
            const currentDateDiv = document.getElementById('currentDate');
            
            fajrTimeDiv.textContent = fajrTime;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            currentDateDiv.textContent = date.toLocaleDateString('en-US', options);
            
            resultDiv.classList.add('show');
        }
    </script>
</body>
</html>
